<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f1419 0%, #1a1d26 100%);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      .jarvis-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        z-index: 10;
      }

      .jarvis-logo {
        position: relative;
        width: 200px;
        height: 200px;
      }

      .circle-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .circle-outer {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 2px solid rgba(59, 130, 246, 0.5);
        border-radius: 50%;
        animation: rotate 20s linear infinite;
      }

      .circle-middle {
        position: absolute;
        width: 85%;
        height: 85%;
        top: 7.5%;
        left: 7.5%;
        border: 2px solid rgba(59, 130, 246, 0.3);
        border-radius: 50%;
        animation: rotate 15s linear infinite reverse;
      }

      .circle-inner {
        position: absolute;
        width: 70%;
        height: 70%;
        top: 15%;
        left: 15%;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.1) 0%,
          transparent 70%
        );
        border-radius: 50%;
        box-shadow:
          0 0 40px rgba(59, 130, 246, 0.4),
          inset 0 0 40px rgba(59, 130, 246, 0.2);
      }

      .jarvis-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 8px;
        color: #fff;
        text-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        z-index: 20;
      }

      .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
      }

      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: rgba(59, 130, 246, 0.8);
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
        animation: float 3s ease-in-out infinite;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) translateX(0);
          opacity: 0.3;
        }
        50% {
          transform: translateY(-20px) translateX(10px);
          opacity: 1;
        }
      }

      .datetime-display {
        position: absolute;
        top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .time-display {
        font-size: 60px;
        font-weight: 500;
        letter-spacing: 8px;
        color: #fff;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      }

      .date-display {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        text-align: center;
      }

      /* Efeito de pulso no círculo */
      .pulse {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 2px solid rgba(59, 130, 246, 0.6);
        border-radius: 50%;
        animation: pulse 2s ease-out infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(1.2);
          opacity: 0;
        }
      }

      /* Background stars effect */
      .stars {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
      }

      .star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.2;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="stars" id="stars"></div>

    <div class="jarvis-container">
      <div class="space-top"></div>

      <div class="jarvis-logo">
        <div class="circle-container">
          <div class="pulse"></div>
          <div class="circle-outer"></div>
          <div class="circle-middle"></div>
          <div class="circle-inner"></div>
          <div class="particles" id="particles"></div>
        </div>
        <div class="jarvis-text">JARVIS</div>
      </div>

      <div class="datetime-display">
        <div class="time-display" id="time">00:00</div>
        <div class="date-display" id="date">LOADING...</div>
      </div>
    </div>

    <script>
      // Criar estrelas de fundo
      function createStars() {
        const starsContainer = document.getElementById("stars");
        for (let i = 0; i < 50; i++) {
          const star = document.createElement("div");
          star.className = "star";
          star.style.left = Math.random() * 100 + "%";
          star.style.top = Math.random() * 100 + "%";
          star.style.animationDelay = Math.random() * 3 + "s";
          starsContainer.appendChild(star);
        }
      }

      // Criar partículas
      function createParticles() {
        const particlesContainer = document.getElementById("particles");
        for (let i = 0; i < 20; i++) {
          const particle = document.createElement("div");
          particle.className = "particle";
          const angle = (Math.PI * 2 * i) / 20;
          const radius = 40 + Math.random() * 40;
          particle.style.left = 50 + Math.cos(angle) * radius + "%";
          particle.style.top = 50 + Math.sin(angle) * radius + "%";
          particle.style.animationDelay = Math.random() * 3 + "s";
          particlesContainer.appendChild(particle);
        }
      }

      // Atualizar hora e data
      function updateDateTime() {
        const now = new Date();

        // Formatar hora
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        document.getElementById("time").textContent = `${hours}:${minutes}`;

        // Formatar data
        const diasSemana = [
          "DOMINGO",
          "SEGUNDA",
          "TERÇA",
          "QUARTA",
          "QUINTA",
          "SEXTA",
          "SÁBADO",
        ];
        const meses = [
          "JANEIRO",
          "FEVEREIRO",
          "MARÇO",
          "ABRIL",
          "MAIO",
          "JUNHO",
          "JULHO",
          "AGOSTO",
          "SETEMBRO",
          "OUTUBRO",
          "NOVEMBRO",
          "DEZEMBRO",
        ];

        const diaSemana = diasSemana[now.getDay()];
        const dia = now.getDate();
        const mes = meses[now.getMonth()];

        document.getElementById("date").textContent =
          `${diaSemana} ${dia} ${mes}`;
      }

      // Inicializar
      createStars();
      createParticles();
      updateDateTime();

      // Atualizar a cada segundo
      setInterval(updateDateTime, 1000);
    </script>
  </body>
</html>
